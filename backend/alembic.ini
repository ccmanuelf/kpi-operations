# Alembic Configuration — KPI Operations Platform
# Run from the backend/ directory:
#   python -m alembic upgrade head
#   python -m alembic stamp head        (mark existing DB as current)
#   python -m alembic revision -m "..."  (create new migration)

[alembic]
# Path to migration scripts (relative to this file / CWD)
script_location = alembic

# Template for migration filenames — timestamp prefix for ordering
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Placeholder — overridden programmatically in env.py from backend.config.settings
sqlalchemy.url = sqlite:///placeholder.db

# sys.path prepend so that "backend.*" imports resolve when running from repo root
prepend_sys_path = ..

# Timezone for file_template timestamps
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files in the versions directory
# sourceless = false

# Version path separator — use 'os' for os.pathsep
# version_path_separator = os

# Output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8


# ---------- Logging ----------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

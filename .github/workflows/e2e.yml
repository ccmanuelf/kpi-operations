name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-sqlite:
    runs-on: ubuntu-latest
    # 45min: previous run hit the 30min cap mid-suite (sequential SQLite
    # workers + ~169 specs). The two clipboard-paste tests that were
    # eating ~36s/each on flake retries are now deterministic via
    # synthetic paste events, but the suite still benefits from a
    # margin to absorb cold-start slowness on shared runners.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.lock

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes --only-binary=:all: -r backend/requirements-dev.lock

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E tests (SQLite)
        run: cd frontend && npm run test:e2e:sqlite

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: frontend/playwright-report-sqlite/
          retention-days: 14

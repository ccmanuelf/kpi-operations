# IMPORTANT: Enable GitHub branch protection on 'main':
# Settings > Branches > Add rule for 'main':
# - Require status checks: backend-tests, frontend-lint-and-tests, docker-build, tooling-tests
# - Require branches to be up to date before merging
# This ensures broken builds (e.g. unclosed Vue template tags) never reach main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.lock

      - name: Install dependencies
        # pip itself is upgraded first so the pip-audit gate below audits a
        # current pip (old runner pips carry their own PYSEC advisories).
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes --only-binary=:all: -r requirements-dev.lock

      - name: Install MiniZinc CLI
        # The simulation_v2 optimization tests gate on is_minizinc_available()
        # (the MiniZinc CLI). Only the Dockerfile installed it, so ~50 solver
        # tests silently skipped in every required check (Run 8 H-1). Mirror the
        # Dockerfile's apt install so the optimization suite actually runs here.
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minizinc

      - name: Lock drift check (sources must be re-locked)
        working-directory: .
        run: |
          ./scripts/lock-deps.sh
          git diff --exit-code -- backend/requirements.lock backend/requirements-dev.lock \
            || { echo "::error::Lock drift — a source requirements file changed without regenerating the lock. Run scripts/lock-deps.sh and commit backend/*.lock."; exit 1; }
      - name: Build-free hash + wheel verify
        working-directory: .
        run: |
          pip install --require-hashes --only-binary=:all: --dry-run -r backend/requirements.lock
          pip install --require-hashes --only-binary=:all: --dry-run -r backend/requirements-dev.lock

      - name: Check code formatting
        run: black --check .

      - name: Run type checking
        # Run from project root so `from backend.X import ...` resolves
        # against backend/ as a package. Running from backend/ with `mypy .`
        # made every cross-module backend.* import unresolvable and silently
        # downgraded type checking to Any. See pyproject.toml [tool.mypy].
        working-directory: .
        run: mypy backend --ignore-missing-imports --no-error-summary

      - name: Run linting
        run: flake8 . --count --show-source --statistics

      - name: Seed demo database
        # The smoke-test suite (test_smoke_paramless_get) hits every
        # paramless GET via TestClient and expects no 5xx — that exercise
        # only makes sense against a populated schema. Most other tests
        # use the in-memory `transactional_db` fixture and ignore this
        # file, but a handful (and the smoke test) bind to the file-based
        # DATABASE_URL. Seeding once here gives them a working schema +
        # 5 demo clients without polluting the rest of the suite (writes
        # land in the disposable demo DB, not in any persistent store).
        working-directory: .
        run: PYTHONPATH=. python backend/scripts/init_demo_database.py

      - name: Run tests with coverage
        # Coverage source/omit/fail_under come from backend/.coveragerc; pytest
        # options from the root pyproject.toml [tool.pytest.ini_options]
        # (single config — Run 7 T0.2/T0.3). The former --cov=. here measured
        # the test suite itself, inflating the gate. pythonpath=["."] in
        # pyproject replaces the PYTHONPATH=.. workaround.
        run: pytest tests/ --tb=short -q

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 14

      - name: Security scan
        run: bandit -r . -ll --exclude ./tests -q

      - name: Secret scanning
        # Blocking (Run 7 T2.1): detect-secrets-hook exits nonzero on any
        # finding not in the committed .secrets.baseline. Pinned via
        # requirements-dev.txt. Runs from the repo root over tracked files
        # only (the old step ran from backend/ and ended every branch in
        # `|| echo`, so it could never fail).
        working-directory: .
        run: git ls-files -z | xargs -0 -s 900000 detect-secrets-hook --baseline .secrets.baseline

      - name: Dependency vulnerability audit (pip-audit)
        # Blocking (Run 7 T2.2): audits the exact environment this job
        # installed (runtime + dev deps + resolved transitives) against the
        # PyPI advisory DB. Fails on any known CVE.
        run: pip-audit --progress-spinner off

  frontend-lint-and-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint -- --no-fix

      - name: Run TypeScript type-check
        run: npm run typecheck

      - name: Check for orphan test skips
        # Guards against the failure mode that triggered the Phase B.7
        # rewrite: an entry-interface migration shipping with
        # test.describe.skip(...) stopgaps that nobody ever revisited.
        # Every skip must declare a Phase/issue reference or a FIXME
        # date — see docs/CONTRIBUTING.md "E2E Parity" section.
        # The job's default working-directory is `frontend/`; the
        # script lives at the project root, so reach up one level.
        run: bash ../scripts/check-skipped-tests.sh

      - name: Build frontend
        run: npm run build

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

      - name: Security audit
        run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint-and-tests]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build backend Docker image
        run: docker build -t kpi-operations-backend .

      - name: Build frontend Docker image
        run: docker build -t kpi-operations-frontend frontend/

      - name: Smoke test backend image
        run: |
          set -e
          # Four-slash sqlite URL: `sqlite:////tmp/test.db` is absolute
          # `/tmp/test.db`. Three slashes (sqlite:///path) is relative to
          # the container WORKDIR (/app), which doesn't have a `tmp/`
          # subdir — that's what was producing "unable to open database
          # file" on every CI run before the fix.
          docker run -d --name backend-smoke -p 8000:8000 \
            -e DATABASE_URL=sqlite:////tmp/test.db \
            -e SECRET_KEY=ci-test-only-32-chars-minimum-zzz \
            -e DEMO_MODE=true \
            kpi-operations-backend
          # Smart-reseed lifespan does a 10-step DB init on a fresh DB
          # (~10-15s); a fixed `sleep 5` raced the init and curl 502'd
          # before uvicorn was listening. Poll with a 60s budget instead.
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health/live > /dev/null; then
              echo "[CI] backend ready after ${i}x2s"
              break
            fi
            sleep 2
          done
          curl -f http://localhost:8000/health/live || (docker logs backend-smoke && exit 1)
          docker stop backend-smoke
          docker rm backend-smoke

      - name: Fresh database smoke test
        run: |
          set -e
          docker run -d --name backend-freshdb -p 8001:8000 \
            -e DATABASE_URL=sqlite:////tmp/fresh.db \
            -e SECRET_KEY=ci-freshdb-test-32-chars-minimum-zzz \
            -e DEMO_MODE=true \
            kpi-operations-backend
          # Same poll pattern — fresh DB triggers full smart-reseed.
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8001/health/live > /dev/null; then
              echo "[CI] freshdb backend ready after ${i}x2s"
              break
            fi
            sleep 2
          done
          # Auth
          TOKEN=$(curl -sf -X POST http://localhost:8001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}' | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          AUTH="Authorization: Bearer $TOKEN"
          # Hit key workflow endpoints. A non-2xx from any of these is a real
          # regression — collect every failure and fail the step (Run 8 H-2:
          # these were `|| echo WARN`, so the step exited 0 and printed "All
          # passed" even when an endpoint was broken).
          FAILED=""
          check() { curl -sf -H "$AUTH" "$1" > /dev/null || FAILED="$FAILED $2"; }
          check "http://localhost:8001/api/capacity/orders?client_id=ACME-MFG" "capacity/orders"
          check "http://localhost:8001/api/work-orders" "work-orders"
          check "http://localhost:8001/api/production" "production"
          check "http://localhost:8001/api/quality/" "quality"
          check "http://localhost:8001/api/downtime" "downtime"
          check "http://localhost:8001/api/attendance" "attendance"
          check "http://localhost:8001/api/kpi/dashboard?client_id=ACME-MFG" "kpi/dashboard"
          check "http://localhost:8001/api/alerts/dashboard?client_id=ACME-MFG" "alerts/dashboard"
          check "http://localhost:8001/api/onboarding/status?client_id=ACME-MFG" "onboarding"
          check "http://localhost:8001/api/shifts" "shifts"
          if [ -n "$FAILED" ]; then
            echo "::error::Smoke test failed for:$FAILED"
            docker logs backend-freshdb | tail -50 || true
            docker stop backend-freshdb && docker rm backend-freshdb
            exit 1
          fi
          echo "All workflow endpoints passed"
          docker stop backend-freshdb && docker rm backend-freshdb

  tooling-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run dev-tooling shell unit tests
        # Guards the cross-review PR-gate scripts (scripts/cross-review-*.sh):
        # if the gate regex or marker logic regresses, these fail here instead
        # of silently letting unreviewed PRs through. jq + git are preinstalled
        # on ubuntu-latest runners.
        run: |
          shopt -s nullglob
          tests=(tests/scripts/*.sh)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "::error::no tooling tests found under tests/scripts/"
            exit 1
          fi
          # Run every test (don't abort on first failure) so one regression
          # doesn't mask others, then fail the job if any failed.
          failed=0
          for t in "${tests[@]}"; do
            echo "== $t =="
            bash "$t" || failed=1
          done
          exit $failed

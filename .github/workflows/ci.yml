# IMPORTANT: Enable GitHub branch protection on 'main':
# Settings > Branches > Add rule for 'main':
# - Require status checks: backend-tests, frontend-lint-and-tests, docker-build, tooling-tests
# - Require branches to be up to date before merging
# This ensures broken builds (e.g. unclosed Vue template tags) never reach main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.lock

      - name: Install dependencies
        # pip AND setuptools are upgraded first so the pip-audit gate below
        # audits current build tools (old runner pip/setuptools carry their own
        # PYSEC advisories — e.g. setuptools 79.0.1 → PYSEC-2026-3447, fixed in
        # 83.0.0). These are unpinned build tools left out of the hash-pinned
        # lock by pip-tools, not runtime deps, so upgrading them here is safe.
        run: |
          python -m pip install --upgrade pip setuptools
          pip install --require-hashes --only-binary=:all: -r requirements-dev.lock

      - name: Install MiniZinc CLI
        # The simulation_v2 optimization tests gate on is_minizinc_available()
        # (the MiniZinc CLI). Only the Dockerfile installed it, so ~50 solver
        # tests silently skipped in every required check (Run 8 H-1). Mirror the
        # Dockerfile's apt install so the optimization suite actually runs here.
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minizinc

      - name: Lock drift check (sources must be re-locked)
        working-directory: .
        run: |
          ./scripts/lock-deps.sh
          git diff --exit-code -- backend/requirements.lock backend/requirements-dev.lock \
            || { echo "::error::Lock drift — a source requirements file changed without regenerating the lock. Run scripts/lock-deps.sh and commit backend/*.lock."; exit 1; }
      - name: Build-free hash + wheel verify
        working-directory: .
        run: |
          pip install --require-hashes --only-binary=:all: --dry-run -r backend/requirements.lock
          pip install --require-hashes --only-binary=:all: --dry-run -r backend/requirements-dev.lock

      - name: Check code formatting
        run: black --check .

      - name: Run type checking
        # Run from project root so `from backend.X import ...` resolves
        # against backend/ as a package. Running from backend/ with `mypy .`
        # made every cross-module backend.* import unresolvable and silently
        # downgraded type checking to Any. See pyproject.toml [tool.mypy].
        working-directory: .
        run: mypy backend --ignore-missing-imports --no-error-summary

      - name: Run linting
        run: flake8 . --count --show-source --statistics

      - name: Seed demo database
        # The smoke-test suite (test_smoke_paramless_get) hits every
        # paramless GET via TestClient and expects no 5xx — that exercise
        # only makes sense against a populated schema. Most other tests
        # use the in-memory `transactional_db` fixture and ignore this
        # file, but a handful (and the smoke test) bind to the file-based
        # DATABASE_URL. Seeding once here gives them a working schema +
        # 5 demo clients without polluting the rest of the suite (writes
        # land in the disposable demo DB, not in any persistent store).
        working-directory: .
        run: PYTHONPATH=. python backend/scripts/init_demo_database.py

      - name: Run tests with coverage
        # Coverage source/omit/fail_under come from backend/.coveragerc; pytest
        # options from the root pyproject.toml [tool.pytest.ini_options]
        # (single config — Run 7 T0.2/T0.3). The former --cov=. here measured
        # the test suite itself, inflating the gate. pythonpath=["."] in
        # pyproject replaces the PYTHONPATH=.. workaround.
        run: pytest tests/ --tb=short -q

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 14

      - name: Security scan
        run: bandit -r . -ll --exclude ./tests -q

      - name: Secret scanning
        # Blocking (Run 7 T2.1): detect-secrets-hook exits nonzero on any
        # finding not in the committed .secrets.baseline. Pinned via
        # requirements-dev.txt. Runs from the repo root over tracked files
        # only (the old step ran from backend/ and ended every branch in
        # `|| echo`, so it could never fail).
        working-directory: .
        run: git ls-files -z | xargs -0 -s 900000 detect-secrets-hook --baseline .secrets.baseline

      - name: Dependency vulnerability audit (pip-audit)
        # Blocking (Run 7 T2.2): audits the exact environment this job
        # installed (runtime + dev deps + resolved transitives) against the
        # PyPI advisory DB. Fails on any known CVE.
        run: pip-audit --progress-spinner off

  frontend-lint-and-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint -- --no-fix

      - name: Run TypeScript type-check
        run: npm run typecheck

      - name: Check for orphan test skips
        # Guards against the failure mode that triggered the Phase B.7
        # rewrite: an entry-interface migration shipping with
        # test.describe.skip(...) stopgaps that nobody ever revisited.
        # Every skip must declare a Phase/issue reference or a FIXME
        # date — see docs/CONTRIBUTING.md "E2E Parity" section.
        # The job's default working-directory is `frontend/`; the
        # script lives at the project root, so reach up one level.
        run: bash ../scripts/check-skipped-tests.sh

      - name: Build frontend
        run: npm run build

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

      - name: Security audit
        run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint-and-tests]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build backend Docker image
        run: docker build -t kpi-operations-backend .

      - name: Build frontend Docker image
        run: docker build -t kpi-operations-frontend frontend/

      - name: Smoke test backend image
        run: |
          set -e
          # Four-slash sqlite URL: `sqlite:////tmp/test.db` is absolute
          # `/tmp/test.db`. Three slashes (sqlite:///path) is relative to
          # the container WORKDIR (/app), which doesn't have a `tmp/`
          # subdir — that's what was producing "unable to open database
          # file" on every CI run before the fix.
          docker run -d --name backend-smoke -p 8000:8000 \
            -e DATABASE_URL=sqlite:////tmp/test.db \
            -e SECRET_KEY=ci-test-only-32-chars-minimum-zzz \
            -e DEMO_MODE=true \
            kpi-operations-backend
          # Smart-reseed lifespan does a 10-step DB init on a fresh DB
          # (~10-15s); a fixed `sleep 5` raced the init and curl 502'd
          # before uvicorn was listening. Poll with a 60s budget instead.
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/health/live > /dev/null; then
              echo "[CI] backend ready after ${i}x2s"
              break
            fi
            sleep 2
          done
          curl -f http://localhost:8000/health/live || (docker logs backend-smoke && exit 1)
          docker stop backend-smoke
          docker rm backend-smoke

      - name: Fresh database smoke test
        run: |
          set -e
          docker run -d --name backend-freshdb -p 8001:8000 \
            -e DATABASE_URL=sqlite:////tmp/fresh.db \
            -e SECRET_KEY=ci-freshdb-test-32-chars-minimum-zzz \
            -e DEMO_MODE=true \
            kpi-operations-backend
          # Same poll pattern — fresh DB triggers full smart-reseed.
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8001/health/live > /dev/null; then
              echo "[CI] freshdb backend ready after ${i}x2s"
              break
            fi
            sleep 2
          done
          # Auth
          TOKEN=$(curl -sf -X POST http://localhost:8001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}' | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          AUTH="Authorization: Bearer $TOKEN"
          # Hit key workflow endpoints. A non-2xx from any of these is a real
          # regression — collect every failure and fail the step (Run 8 H-2:
          # these were `|| echo WARN`, so the step exited 0 and printed "All
          # passed" even when an endpoint was broken).
          FAILED=""
          check() { curl -sf -H "$AUTH" "$1" > /dev/null || FAILED="$FAILED $2"; }
          check "http://localhost:8001/api/capacity/orders?client_id=ACME-MFG" "capacity/orders"
          check "http://localhost:8001/api/work-orders" "work-orders"
          check "http://localhost:8001/api/production" "production"
          check "http://localhost:8001/api/quality/" "quality"
          check "http://localhost:8001/api/downtime" "downtime"
          check "http://localhost:8001/api/attendance" "attendance"
          check "http://localhost:8001/api/kpi/dashboard?client_id=ACME-MFG" "kpi/dashboard"
          check "http://localhost:8001/api/alerts/dashboard?client_id=ACME-MFG" "alerts/dashboard"
          check "http://localhost:8001/api/onboarding/status?client_id=ACME-MFG" "onboarding"
          check "http://localhost:8001/api/shifts" "shifts"
          if [ -n "$FAILED" ]; then
            echo "::error::Smoke test failed for:$FAILED"
            docker logs backend-freshdb | tail -50 || true
            docker stop backend-freshdb && docker rm backend-freshdb
            exit 1
          fi
          echo "All workflow endpoints passed"
          docker stop backend-freshdb && docker rm backend-freshdb

  tooling-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run dev-tooling shell unit tests
        # Guards the cross-review PR-gate scripts (scripts/cross-review-*.sh):
        # if the gate regex or marker logic regresses, these fail here instead
        # of silently letting unreviewed PRs through. jq + git are preinstalled
        # on ubuntu-latest runners.
        run: |
          shopt -s nullglob
          tests=(tests/scripts/*.sh)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "::error::no tooling tests found under tests/scripts/"
            exit 1
          fi
          # Run every test (don't abort on first failure) so one regression
          # doesn't mask others, then fail the job if any failed.
          failed=0
          for t in "${tests[@]}"; do
            echo "== $t =="
            bash "$t" || failed=1
          done
          exit $failed

  mariadb-portability:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root  # pragma: allowlist secret
          MARIADB_DATABASE: kpi_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/kpi_test  # pragma: allowlist secret
      SECRET_KEY: ci-portability-secret-key-not-used-in-prod-0001  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes --only-binary=:all: -r requirements-dev.lock

      - name: Run MariaDB portability tests
        run: pytest tests/test_mariadb_portability.py -v --no-cov --junitxml=mariadb-report.xml

      - name: Verify no integration tests were skipped
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET

          tree = ET.parse("mariadb-report.xml")
          root = tree.getroot()
          # pytest emits either a bare <testsuite> or <testsuites><testsuite>.
          suite = root if root.tag == "testsuite" else root.find("testsuite")

          skipped = suite.get("skipped")
          errors = suite.get("errors")
          failures = suite.get("failures")

          assert skipped == "0", f"MariaDB integration tests skipped (expected 0, got {skipped}) - job proves nothing"
          assert errors == "0", f"MariaDB portability tests had errors (expected 0, got {errors})"
          assert failures == "0", f"MariaDB portability tests failed (expected 0, got {failures})"

          print(f"OK: {suite.get('tests')} tests ran, 0 skipped/errors/failures")
          EOF

  compose-stack-smoke:
    # Proves the exact VM topology (docker-compose.prod.yml): MariaDB + Caddy
    # internal-CA TLS + gunicorn backend + static frontend + backup sidecar.
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint-and-tests]
    env:
      # KPI_DATA_ROOT is exported per-run below: the `runner` context is NOT
      # available in job-level env (steps only) — using it here makes the whole
      # workflow file invalid (startup_failure, zero jobs created).
      SECRET_KEY: ci-compose-smoke-secret-32-chars-min  # pragma: allowlist secret
      DB_PASSWORD: ci-smoke-db-pw  # pragma: allowlist secret
      DB_ROOT_PASSWORD: ci-smoke-root-pw  # pragma: allowlist secret
      CORS_ORIGINS: https://localhost
      DEMO_MODE: "true"   # fresh MariaDB has no users until PR-4's create_admin;
                          # also the only CI exercise of the full demo seed on InnoDB
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Export KPI_DATA_ROOT
        run: echo "KPI_DATA_ROOT=$RUNNER_TEMP/kpi" >> "$GITHUB_ENV"

      - name: Preflight + prepare data root
        # preflight.sh: fail fast if the datadir path is case-insensitive.
        # init-data-root.sh: the single-source manifest (same script the VM uses).
        run: |
          bash deploy/preflight.sh "$KPI_DATA_ROOT"
          bash deploy/init-data-root.sh "$KPI_DATA_ROOT"

      - name: Validate compose config
        run: docker compose -f docker-compose.prod.yml config -q

      - name: Build the stack
        run: docker compose -f docker-compose.prod.yml build

      - name: Chown host mounts to the backend image uid + start
        # The backend runs as a build-time-dynamic non-root uid; the writable
        # bind mounts must be owned by it or uploads/reports/logs writes EACCES.
        # Query the uid from the built image (no deps, entrypoint overridden to a
        # plain id -u), chown via the shared script, then start (no rebuild).
        run: |
          uid=$(docker compose -f docker-compose.prod.yml run --rm --no-deps \
            --entrypoint "id -u" backend | tr -d '\r' | tail -n1)
          echo "backend image uid=$uid"
          sudo bash deploy/init-data-root.sh "$KPI_DATA_ROOT" --chown "$uid"
          docker compose -f docker-compose.prod.yml up -d

      - name: Run smoke proofs
        # The smoke script's proof 0 owns the readiness/seed wait — no separate
        # CI health-wait step.
        run: bash deploy/smoke/compose-smoke.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.prod.yml logs --tail 200

      - name: Tear down demo stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v

      # --- DEMO_MODE=false boot-only proof (the ACTUAL VM configuration) -------
      # The demo-mode phase above is the data-path proof; this proves the prod
      # config boots against an EMPTY database with no seeder: /health/database
      # serves and POST /api/auth/login returns exactly 401 because no users
      # exist (PR-4's create_admin provisions the first admin on the real VM).
      # Runs after the demo teardown because the container_names collide.
      - name: Prod-config boot-only (DEMO_MODE=false)
        env:
          DEMO_MODE: "false"
        run: |
          KPI_DATA_ROOT="$RUNNER_TEMP/kpi-prod"; export KPI_DATA_ROOT
          bash deploy/preflight.sh "$KPI_DATA_ROOT"
          bash deploy/init-data-root.sh "$KPI_DATA_ROOT"
          uid=$(docker compose -f docker-compose.prod.yml run --rm --no-deps \
            --entrypoint "id -u" backend | tr -d '\r' | tail -n1)
          sudo bash deploy/init-data-root.sh "$KPI_DATA_ROOT" --chown "$uid"
          docker compose -f docker-compose.prod.yml up -d --no-build db backend
          # Wait for the backend healthy (no Caddy in this phase — exec inside).
          ready=0
          for i in $(seq 1 60); do
            state=$(docker inspect --format='{{.State.Status}}' kpi-backend 2>/dev/null || echo missing)
            if [ "$state" = "exited" ]; then
              echo "backend exited"; docker compose -f docker-compose.prod.yml logs backend | tail -100; exit 1
            fi
            if docker compose -f docker-compose.prod.yml exec -T backend \
                 curl -sf http://localhost:8000/health/database >/dev/null 2>&1; then
              ready=1; break
            fi
            sleep 5
          done
          [ "$ready" = "1" ] || { echo "FAIL: backend never healthy (DEMO_MODE=false)"; docker compose -f docker-compose.prod.yml logs backend | tail -100; exit 1; }
          # Login must be exactly 401 on the empty prod DB (no seeded users).
          code=$(docker compose -f docker-compose.prod.yml exec -T backend \
            curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8000/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin123"}')  # pragma: allowlist secret
          [ "$code" = "401" ] || { echo "FAIL: login -> $code (want 401 on empty prod DB)"; exit 1; }
          echo "OK prod config boots empty: /health/database 200 + login 401"

      - name: Tear down prod-config stack
        if: always()
        run: KPI_DATA_ROOT="$RUNNER_TEMP/kpi-prod" docker compose -f docker-compose.prod.yml down -v

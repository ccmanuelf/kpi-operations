repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        files: ^backend/
        language_version: python3.11

  - repo: https://github.com/pycqa/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        files: ^backend/
        additional_dependencies: []

  # mypy as a local system hook rather than mirrors-mypy. The mirrors-
  # mypy hook invokes mypy file-by-file on the staged paths, which
  # collapses our `namespace_packages = true` cross-module resolution
  # and emits cascading false positives like `backend.database has no
  # attribute Base`. Running `mypy backend` once per commit (whole
  # package) matches CI and the local dev workflow exactly.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend, whole-package)
        entry: python -m mypy backend
        language: system
        # Trigger on any backend .py change but pass no filenames — the
        # entry runs the whole-package check itself.
        files: ^backend/.*\.py$
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: '1.8.3'
    hooks:
      - id: bandit
        args: [-ll, --exclude, ./tests, -q]

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint --ext .vue,.js,.jsx,.cjs,.mjs --no-fix'
        language: system
        files: ^frontend/src/.*\.(vue|js|jsx|cjs|mjs)$
        pass_filenames: false

      # NOTE: Full frontend build verification (npm run build) is intentionally
      # NOT included as a pre-commit hook because it takes 30-60s per commit.
      # Build verification is enforced in CI (ci.yml frontend-lint-and-tests job)
      # which runs `npm run build` BEFORE tests as the first quality gate.
      # Enable branch protection to require CI to pass before merging to main.

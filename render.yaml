# Render.com Deployment Blueprint — KPI Operations Platform
# Deploy with: https://render.com/deploy?repo=<your-repo-url>
#
# Architecture:
#   - Backend API: Docker (FastAPI + uvicorn), persistent disk for SQLite
#   - Frontend:    Docker (nginx serving Vue 3 SPA, proxying /api to backend)
#
# The frontend nginx config references "backend:8000" for API proxying.
# On Render, the dockerCommand replaces this hostname at container startup
# with the backend service's internal URL so cross-service proxying works.

services:
  # ── Backend API Service ───────────────────────────────────────────────
  - type: web
    name: kpi-operations-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////app/database/kpi_platform.db
      - key: CORS_ORIGINS
        sync: false  # Set manually: https://kpi-operations-frontend.onrender.com
      - key: DEBUG
        value: "false"
      - key: DEMO_MODE
        value: "true"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: REPORT_EMAIL_ENABLED
        value: "false"
    disk:
      name: kpi-database
      mountPath: /app/database
      sizeGB: 1

  # ── Frontend Static Site ──────────────────────────────────────────────
  - type: web
    name: kpi-operations-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    region: oregon
    healthCheckPath: /health
    # Replace the Docker-internal "backend:8000" hostname in nginx.conf
    # with the real backend service URL so API proxying works on Render.
    dockerCommand: >-
      sh -c "sed -i
      's|http://backend:8000|https://kpi-operations-api.onrender.com|g'
      /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'"
    envVars:
      - key: VITE_API_URL
        value: /api

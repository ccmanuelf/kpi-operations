# Render.com Deployment Blueprint — KPI Operations Platform v1.0.0-rc.1
# Deploy with: https://render.com/deploy?repo=https://github.com/ccmanuelf/kpi-operations
#
# Architecture:
#   - Backend API: Docker (FastAPI + uvicorn), SQLite demo DB (ephemeral on free tier)
#   - Frontend:    Docker (nginx serving Vue 3 SPA, proxying /api to backend)
#
# Free tier notes:
#   - No persistent disk: DB recreates on each deploy (demo seeder runs automatically)
#   - Services spin down after 15 min of inactivity (~30-60s cold start)
#   - Perfect for demos — fresh data on every boot

services:
  # ── Backend API Service ───────────────────────────────────────────────
  - type: web
    name: kpi-operations-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////app/database/kpi_platform.db
      - key: CORS_ORIGINS
        value: https://kpi-operations-frontend.onrender.com
      - key: DEBUG
        value: "false"
      - key: DEMO_MODE
        value: "true"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: REPORT_EMAIL_ENABLED
        value: "false"

  # ── Frontend (nginx + Vue SPA) ──────────────────────────────────────
  - type: web
    name: kpi-operations-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: VITE_API_URL
        value: https://kpi-operations-api.onrender.com/api/v1
      - key: BACKEND_URL
        value: https://kpi-operations-api.onrender.com
      - key: CSP_CONNECT_EXTRA
        value: https://kpi-operations-api.onrender.com
